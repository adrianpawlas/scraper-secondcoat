name: Second Coat Scraper

on:
  schedule:
    # Every Wednesday at 3:00 PM UTC
    - cron: '0 15 * * 3'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes'
        required: false
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install transformers torch pillow aiohttp beautifulsoup4 lxml
      
      - name: Run scraper (smart mode)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SOURCE: scraper-secondcoat
          BRAND: 'Second Coat'
        run: |
          python main.py ${{ secrets.SUPABASE_ANON_KEY }}
      
      - name: Verify upload
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python -c "
          import requests
          resp = requests.get(
              '${{ secrets.SUPABASE_URL }}/rest/v1/products?source=eq.scraper-secondcoat&select=id,title',
              headers={'apikey': '${{ secrets.SUPABASE_ANON_KEY }}', 'Authorization': 'Bearer ${{ secrets.SUPABASE_ANON_KEY }}'}
          )
          products = resp.json()
          print(f'Products in database: {len(products)}')
          for p in products:
              print(f'  - {p.get(\"title\", \"?\")[:45]}')
          "
      
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            scraper.log
            failed_products.log
          retention-days: 7